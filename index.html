<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria - Desafío de las Copas</title>
    <!-- Librería de íconos para WhatsApp -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('back.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        /* ANIMACIONES */
        @keyframes moviLogo {
            0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.4)); }
            50% { transform: scale(1.04) rotate(1deg); filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.6)); }
        }

        @keyframes titilar {
            0%, 100% { color: rgba(255, 255, 255, 0.6); }
            50% { color: rgba(255, 255, 255, 1); text-shadow: 0 0 10px rgba(255,255,255,0.8); }
        }

        @keyframes pulsoValidar {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4); background-color: #2ecc71; }
            50% { transform: scale(1.05); box-shadow: 0 8px 25px rgba(52, 152, 219, 0.8); background-color: #27ae60; }
        }

        @keyframes flotarVentana {
            0%, 100% { transform: scale(1) translateY(0px); }
            50% { transform: scale(1.02) translateY(-6px); }
        }

        /* COMPONENTES GENERALES */
        .btn-general {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            background-color: #2ecc71;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            margin-bottom: 25px;
        }

        .btn-general:hover { transform: scale(1.08); background-color: #27ae60; }

        .pantalla-completa {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.45);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            color: #ffffff;
            padding: 20px;
            box-sizing: border-box;
        }

        /* AJUSTE PANTALLA ENTRADA */
        #pantalla-entrada {
            justify-content: flex-start;
            padding-top: 14vh;
            padding-bottom: 5vh;
        }

        .logo-grande img {
            max-width: 280px;
            height: auto;
            margin-bottom: 35px;
            animation: moviLogo 4s ease-in-out infinite; 
        }

        .contenedor-blanco-patrio {
            background-color: #ffffff;
            padding: 25px 30px;
            border-radius: 15px;
            max-width: 460px;
            box-sizing: border-box;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 6px solid #74acdf;
            outline: 4px solid #ffffff;
            outline-offset: -10px;
            box-shadow: inset 0 0 0 6px #74acdf, 0 6px 25px rgba(0,0,0,0.5);
            z-index: 15;
        }

        .imagen-messi {
            max-width: 260px;
            height: auto;
            border-radius: 12px;
            margin-top: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .contenedor-copas-pantalla {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .contenedor-copas-pantalla img {
            max-width: 70px;
            height: auto;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
        }

        /* PIE DE PÁGINA */
        .bloque-contacto {
            display: inline-block;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
            margin-top: auto; 
            margin-bottom: 2vh; 
            padding: 10px;
        }
        .bloque-contacto:hover { transform: scale(1.1); }
        .bloque-contacto span {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1.05rem;
            font-style: italic;
            font-weight: bold;
            letter-spacing: 1px;
            animation: titilar 2s infinite ease-in-out;
        }

        /* MODAL TRANSLÚCIDO JARD */
        .modal-jard {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .tarjeta-jard {
            background-color: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #1a252f;
            padding: 30px 25px;
            border-radius: 20px;
            border: 4px solid #74acdf;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            max-width: 340px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            animation: flotarVentana 3.5s ease-in-out infinite;
        }

        .tarjeta-jard h3 {
            font-size: 2.4rem;
            font-weight: 900;
            margin: 0 0 5px 0;
            color: #1a252f;
            letter-spacing: 2px;
            text-shadow: 1px 1px 1px rgba(255,255,255,0.6);
        }

        .tarjeta-jard .sub-sub {
            font-size: 1.15rem;
            font-style: italic;
            color: #4f5d5e;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .tarjeta-jard .tags-servicios {
            font-size: 0.95rem;
            color: #1a252f;
            line-height: 1.6;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            border: 1px solid rgba(116, 172, 223, 0.3);
        }

        .tarjeta-jard .label-contacto {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1a252f;
            margin-bottom: 8px;
        }

        .tarjeta-jard .enlace-wa {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #25d366;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s;
            margin-bottom: 20px;
        }
        .tarjeta-jard .enlace-wa:hover { transform: scale(1.05); }

        .tarjeta-jard .btn-cerrar-jard {
            background-color: #e74c3c;
            color: #ffffff;
            border: none;
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(231, 76, 60, 0.3);
            transition: background-color 0.2s;
        }
        .tarjeta-jard .btn-cerrar-jard:hover { background-color: #c0392b; }

        /* VIDEO DE FONDO PARA VICTORIA FINAL */
        .video-fondo-victoria {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* ZONA DEL JUEGO */
        #zona-juego {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header-juego {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 360px;
            margin-bottom: 15px;
            gap: 10px;
        }

        .logo-contenedor-copas {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 5px;
            box-sizing: border-box;
        }

        .logo-contenedor img {
            max-width: 110px;
            height: auto;
            animation: moviLogo 4s ease-in-out infinite; 
        }

        .vitrina-copas-header {
            background-color: #ffffff;
            border: 2px solid #74acdf;
            border-radius: 12px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            min-width: 140px;
            height: 40px;
            box-sizing: border-box;
        }

        .vitrina-copas-header img {
            width: 24px;
            height: auto;
            transition: all 0.3s ease;
        }

        .copa-bloqueada {
            opacity: 0.25;
            filter: grayscale(100%);
        }

        .copa-activa {
            opacity: 1 !important;
            filter: grayscale(0%) drop-shadow(0px 2px 4px rgba(0,0,0,0.3)) !important;
        }

        .temporizador {
            font-size: 2.8rem;
            font-weight: bold;
            color: #ffffff;
            background-color: rgba(231, 76, 60, 0.9);
            padding: 6px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            letter-spacing: 2px;
        }

        .tablero {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(5, 100px);
            gap: 12px;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            perspective: 1000px; 
        }

        .ficha {
            width: 100px; height: 100px;
            cursor: pointer; position: relative; box-sizing: border-box;
            border-top: 3px solid #3498db; border-bottom: 3px solid #3498db;
            border-left: 3px solid #ffffff; border-right: 3px solid #ffffff;
            border-radius: 12px; background-color: #ffffff;
        }

        .panel-interno {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); border-radius: 8px;
        }

        .ficha.volteada .panel-interno { transform: rotateY(180deg); }

        .cara { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; overflow: hidden; }
        .cara img, .cara video { width: 100%; height: 100%; object-fit: cover; }
        .cara-dorso { background-color: #ffffff; }
        .cara-frente { background-color: #fff; transform: rotateY(180deg); }
        .ficha.bloqueada { cursor: default; }

        #pantalla-derrota {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); z-index: 20;
            flex-direction: column; align-items: center; justify-content: center;
            border-radius: 12px; color: #ffffff; text-align: center; padding: 20px; box-sizing: border-box;
        }
        #pantalla-derrota h2 { font-size: 2.2rem; color: #e74c3c; margin-bottom: 10px; }
        #pantalla-derrota p { font-size: 1.3rem; margin-bottom: 25px; }
    </style>
</head>
<body>

    <!-- 1. PANTALLA PRINCIPAL ENTRADA DIRECTA -->
    <div id="pantalla-entrada" class="pantalla-completa">
        <div class="logo-grande">
            <img src="logo.png" alt="Logo">
        </div>

        <button id="btn-jugar-directo" class="btn-general" style="animation: pulsoValidar 1.5s infinite ease-in-out; margin-top: 25px; margin-bottom: 0;" onclick="comenzarExperiencia()">JUGAR</button>

        <div class="bloque-contacto" onclick="abrirModalJard()">
            <span>dise&ntilde;o multimedia</span>
        </div>
    </div>

    <!-- VENTANA TRANSLÚCIDA INTERACTIVA JARD (MODAL) -->
    <div id="modal-jard" class="modal-jard" onclick="cerrarModalJardAfuera(event)">
        <div class="tarjeta-jard">
            <h3>JARD</h3>
            <div class="sub-sub">Dise&ntilde;o multimedia</div>
            
            <div class="tags-servicios">
                Web Apps &bull; QR Design<br>Shorts games
            </div>
            
            <div class="label-contacto">Contacto:</div>
            
            <a href="https://wa.me/541149496902" target="_blank" rel="noopener noreferrer" class="enlace-wa">
                <i class="fa-brands fa-whatsapp"></i>
                54 1149496902
            </a>
            
            <br>
            <button class="btn-cerrar-jard" onclick="cerrarModalJard()">cerrar</button>
        </div>
    </div>

    <!-- 2. PANTALLA INTERMEDIA DE PROGRESO -->
    <div id="pantalla-progreso" class="pantalla-completa" style="display: none;">
        <div class="contenedor-blanco-patrio">
            <h2 style="font-size: 1.8rem; color: #2ecc71; margin-top: 0; line-height: 1.3;">&iexcl;Excelente!</h2>
            
            <div id="copas-pantalla-intermedia" class="contenedor-copas-pantalla"></div>

            <p id="mensaje-progreso" style="font-size: 1.3rem; color: #34495e; margin-bottom: 25px; font-weight: bold; line-height: 1.4;"></p>
            
            <button id="btn-siguiente-nivel" class="btn-general" style="margin-bottom: 0;" onclick="avanzarSiguienteNivel()">JUGAR DE NUEVO</button>
        </div>
    </div>

    <!-- 3. PANTALLA VICTORIA FINAL (CON VIDEO DE FONDO) -->
    <div id="pantalla-victoria-final" class="pantalla-completa" style="display: none;">
        <video id="video-ganador-fondo" class="video-fondo-victoria" loop muted playsinline>
            <source src="escalonillorando.mp4" type="video/mp4">
        </video>

        <div class="contenedor-blanco-patrio">
            <h2 style="font-size: 1.9rem; color: #2ecc71; margin-top: 0; font-weight: bold; line-height: 1.2;">&iexcl;Felicidades ganaste la cuarta!!</h2>
            
            <div id="copas-pantalla-final" class="contenedor-copas-pantalla"></div>

            <img src="messi.jpg" class="imagen-messi" alt="Messi Campeon">
            
            <button class="btn-general" style="background-color: #3498db; margin-bottom: 0;" onclick="reiniciarTodoElJuego()">VOLVER AL INICIO</button>
        </div>
    </div>

    <!-- 4. INTERFAZ DEL TABLERO DE JUEGO -->
    <div id="zona-juego">
        <div class="header-juego">
            <div class="logo-contenedor-copas">
                <div class="logo-contenedor">
                    <img src="logo.png" alt="Logo Animado">
                </div>
                
                <div class="vitrina-copas-header">
                    <img id="header-copa-1" src="copa.png" class="copa-bloqueada" alt="Copa 1">
                    <img id="header-copa-2" src="copa.png" class="copa-bloqueada" alt="Copa 2">
                    <img id="header-copa-3" src="copa.png" class="copa-bloqueada" alt="Copa 3">
                    <img id="header-copa-4" src="copa.png" class="copa-bloqueada" alt="Copa 4">
                </div>
            </div>
            <div style="color: #fff; font-weight: bold; font-size: 1.2rem;" id="indicador-copa">Copa: 1 / 4</div>
            <div class="temporizador" id="reloj">00:45</div>
        </div>

        <div class="tablero" id="tablero"></div>

        <div id="pantalla-derrota">
            <h2>Perdiste</h2>
            <p>&iquest;Intentamos de nuevo este nivel?</p>
            <button class="btn-general" onclick="reiniciarNivelActual()">Volver a intentar</button>
        </div>
    </div>

    <script>
        const bancoJugadores = [
            '01.jpg', '02.jpg', '03.jpg', '04.jpg', '05.jpg', '06.jpg',
            '07.jpg', '08.jpg', '09.jpg', '10.jpg', '11.jpg', '12.jpg',
            '13.jpg', '14.jpg', '15.jpg'
        ];

        const configuracionNiveles = {
            1: { tiempo: 45, mensaje: "Ya ganaste una copa, consegu\u00ED la segunda." },
            2: { tiempo: 40, mensaje: "Conseguiste la segunda, \u00A1felicidades! Ahora ve por la tercera." },
            3: { tiempo: 35, mensaje: "\u00A1Felicidades! Ahora s\u00ED vamos por la cuarta." },
            4: { tiempo: 28, mensaje: "\u00A1Felicidades ganaste la cuarta!!" }
        };

        let nivelActual = 1;
        let mazo = [];
        let fichasVolteadas = [];
        let bloqueoTablero = false;
        let tiempoRestante = 45; 
        let intervaloReloj = null;
        let juegoIniciado = false;

        const tableroElemento = document.getElementById('tablero');
        const relojElemento = document.getElementById('reloj');
        const pantallaDerrota = document.getElementById('pantalla-derrota');

        const sonidoBobo = new Audio('bobo.mp3');
        const sonidoTicTac = new Audio('tictac.mp3');
        sonidoTicTac.loop = true;
        const sonidoHinchada = new Audio('hinchada.mp3');
        sonidoHinchada.loop = true; 
        const sonidoMal = new Audio('mal.mp3');

        /* --- LOGICA MODAL JARD --- */
        function abrirModalJard() {
            document.getElementById('modal-jard').style.display = 'flex';
        }

        function cerrarModalJard() {
            document.getElementById('modal-jard').style.display = 'none';
        }

        function cerrarModalJardAfuera(e) {
            if (e.target.id === 'modal-jard') {
                cerrarModalJard();
            }
        }

        function comenzarExperiencia() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(err => console.log(err));
            } else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }

            document.getElementById('pantalla-entrada').style.display = 'none';
            document.getElementById('zona-juego').style.display = 'flex';
            
            nivelActual = 1;
            actualizarVitrinaHeader(0); 
            cargarNivel(nivelActual);
        }

        function cargarNivel(nivel) {
            fichasVolteadas = [];
            bloqueoTablero = false;
            juegoIniciado = false;
            
            tiempoRestante = configuracionNiveles[nivel].tiempo;
            relojElemento.innerText = `00:${tiempoRestante.toString().padStart(2, '0')}`;
            document.getElementById('indicador-copa').innerHTML = `Copa: ${nivel} / 4`;
            
            crearTablero();
        }

        function seleccionarJugadores() {
            let cartasRestantes = bancoJugadores.filter(img => img !== '01.jpg');
            cartasRestantes.sort(() => Math.random() - 0.5);
            let seleccionados = ['01.jpg', ...cartasRestantes.slice(0, 6)];
            return [...seleccionados, ...seleccionados, 'bobo.mp4'];
        }

        function mazzcla(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function iniciarTiempo() {
            juegoIniciado = true;
            sonidoTicTac.play().catch(e => console.log(e));
            intervaloReloj = setInterval(() => {
                tiempoRestante--;
                relojElemento.innerText = `00:${tiempoRestante.toString().padStart(2, '0')}`;
                if (tiempoRestante <= 0) { finalizarPorTiempo(); }
            }, 1000);
        }

        function finalizarPorTiempo() {
            clearInterval(intervaloReloj);
            sonidoTicTac.pause();
            sonidoMal.currentTime = 0;
            sonidoMal.play().catch(e => console.log(e));
            sonidoHinchada.currentTime = 0;
            sonidoHinchada.play().catch(e => console.log(e));
            bloqueoTablero = true;
            pantallaDerrota.style.display = 'flex';
        }

        function reiniciarNivelActual() {
            pantallaDerrota.style.display = 'none';
            sonidoTicTac.pause(); sonidoTicTac.currentTime = 0;
            sonidoMal.pause(); sonidoMal.currentTime = 0;
            sonidoHinchada.pause(); sonidoHinchada.currentTime = 0;
            cargarNivel(nivelActual);
        }

        function crearTablero() {
            tableroElemento.innerHTML = '';
            mazo = seleccionarJugadores();
            mazzcla(mazo);
            mazo.forEach((archivo) => {
                const ficha = document.createElement('div');
                ficha.classList.add('ficha');
                ficha.dataset.archivo = archivo;
                const esVideo = archivo.endsWith('.mp4');
                ficha.dataset.tipo = esVideo ? 'especial' : 'normal';
                const panelInterno = document.createElement('div');
                panelInterno.classList.add('panel-interno');
                const caraDorso = document.createElement('div');
                caraDorso.classList.add('cara', 'cara-dorso');
                const imgDorso = document.createElement('img');
                imgDorso.src = 'logo.jpg'; 
                caraDorso.appendChild(imgDorso);
                const caraFrente = document.createElement('div');
                caraFrente.classList.add('cara', 'cara-frente');
                if (esVideo) {
                    const videoElement = document.createElement('video');
                    videoElement.src = archivo; videoElement.muted = true; videoElement.playsInline = true;
                    videoElement.id = 'video-fantasma'; caraFrente.appendChild(videoElement);
                } else {
                    const imgReal = document.createElement('img');
                    imgReal.src = archivo; caraFrente.appendChild(imgReal);
                }
                panelInterno.appendChild(caraDorso);
                panelInterno.appendChild(caraFrente);
                ficha.appendChild(panelInterno);
                ficha.addEventListener('click', alHacerClick);
                tableroElemento.appendChild(ficha);
            });
        }

        function alHacerClick() {
            if (bloqueoTablero) return;
            if (this.classList.contains('volteada') || this.classList.contains('bloqueada')) return;
            if (!juegoIniciado) { iniciarTiempo(); }
            if (this.dataset.tipo === 'especial') {
                bloqueoTablero = true;
                sonidoBobo.currentTime = 0; sonidoBobo.play().catch(e => console.log(e));
                const video = document.getElementById('video-fantasma');
                if (video) { video.currentTime = 0; video.play().catch(e => console.log(e)); }
                this.classList.add('volteada');
                setTimeout(() => { this.classList.remove('volteada'); if (video) video.pause(); bloqueoTablero = false; }, 2000); 
                return;
            }
            const nombreImagen = this.dataset.archivo;
            const nombreAudio = nombreImagen.replace('.jpg', '.mp3');
            const sonidoAsociado = new Audio(nombreAudio);
            sonidoAsociado.volume = 1.0; 
            sonidoAsociado.currentTime = 0; sonidoAsociado.play().catch(e => console.log(e));
            this.classList.add('volteada');
            fichasVolteadas.push(this);
            if (fichasVolteadas.length === 2) { comprobarPar(); }
        }

        function comprobarPar() {
            const [ficha1, ficha2] = fichasVolteadas;
            if (ficha1.dataset.archivo === ficha2.dataset.archivo) {
                ficha1.classList.add('bloqueada'); ficha2.classList.add('bloqueada');
                fichasVolteadas = [];
                const normalesPorResolver = document.querySelectorAll('.ficha[data-tipo="normal"]:not(.bloqueada)');
                if (normalesPorResolver.length === 0) {
                    clearInterval(intervaloReloj); 
                    sonidoTicTac.pause();
                    
                    setTimeout(() => {
                        manejarVictoriaNivel();
                    }, 500);
                }
            } else {
                bloqueoTablero = true;
                setTimeout(() => { ficha1.classList.remove('volteada'); ficha2.classList.remove('volteada'); fichasVolteadas = []; bloqueoTablero = false; }, 1000);
            }
        }

        function manejarVictoriaNivel() {
            document.getElementById('zona-juego').style.display = 'none';
            
            if (nivelActual === 4) {
                inyectarCopasVisuales('copas-pantalla-final', 4);
                document.getElementById('pantalla-victoria-final').style.display = 'flex';
                const v = document.getElementById('video-ganador-fondo');
                if(v) { v.currentTime = 0; v.play().catch(err => console.log(err)); }
            } else {
                inyectarCopasVisuales('copas-pantalla-intermedia', nivelActual);
                
                const datosNivel = configuracionNiveles[nivelActual];
                document.getElementById('mensaje-progreso').innerText = datosNivel.mensaje;
                document.getElementById('pantalla-progreso').style.display = 'flex';
            }
        }

        function avanzarSiguienteNivel() {
            actualizarVitrinaHeader(nivelActual);
            
            document.getElementById('pantalla-progreso').style.display = 'none';
            document.getElementById('zona-juego').style.display = 'flex';
            nivelActual++;
            cargarNivel(nivelActual);
        }

        function inyectarCopasVisuales(idContenedor, quantity) {
            const contenedor = document.getElementById(idContenedor);
            contenedor.innerHTML = "";
            for (let i = 0; i < quantity; i++) {
                const imgCopa = document.createElement('img');
                imgCopa.src = 'copa.png';
                imgCopa.alt = 'Copa';
                contenedor.appendChild(imgCopa);
            }
        }

        function actualizarVitrinaHeader(cantidadGanadas) {
            for (let i = 1; i <= 4; i++) {
                const copaImg = document.getElementById(`header-copa-${i}`);
                if (i <= cantidadGanadas) {
                    copaImg.className = "copa-activa";
                } else {
                    copaImg.className = "copa-bloqueada";
                }
            }
        }

        function reiniciarTodoElJuego() {
            const v = document.getElementById('video-ganador-fondo');
            if(v) { v.pause(); }

            document.getElementById('pantalla-victoria-final').style.display = 'none';
            document.getElementById('pantalla-entrada').style.display = 'flex';
            
            nivelActual = 1;
            actualizarVitrinaHeader(0);
        }
    </script>
</body>
</html>
